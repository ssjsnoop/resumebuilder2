<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Resume Builder</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUmVzdW1lIEJ1aWxkZXIiLCJzaG9ydF9uYW1lIjoiUmVzdW1lcyIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjZTllNWRiIiwidGhlbWVfY29sb3IiOiIjMWIxZDIyIn0=">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --panel:#1b1d22;
  --panel-2:#25272e;
  --panel-line:#33353d;
  --app-bg:#e9e5db;
  --ink:#201f1c;
  --ink-soft:#6b6862;
  --accent:#3457d5;
  --paper:#ffffff;
  --ok:#4a9d6f;
  --warn:#c2542f;
  --radius:2px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--app-bg);
  color:var(--ink);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  min-height:100vh;
}
.eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--ink-soft);
}
button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;}

/* ============ APP SHELL ============ */
.topbar{
  background:var(--panel);
  color:#eceae4;
  padding:14px 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  position:sticky;
  top:0;
  z-index:50;
  border-bottom:3px solid var(--accent);
}
.brand{
  display:flex;
  align-items:baseline;
  gap:10px;
}
.brand .mark{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  letter-spacing:.14em;
  color:var(--accent);
  border:1px solid var(--accent);
  padding:3px 6px;
}
.brand h1{
  font-size:16px;
  font-weight:700;
  margin:0;
  letter-spacing:-.01em;
}
.topbar .sub{
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  color:#93908a;
  display:none;
}
@media(min-width:720px){.topbar .sub{display:block;}}

.btn-primary{
  background:var(--accent);
  color:#fff;
  border:none;
  padding:10px 16px;
  font-size:13px;
  font-weight:600;
  border-radius:var(--radius);
  display:flex;
  align-items:center;
  gap:8px;
  white-space:nowrap;
}
.btn-primary:hover{filter:brightness(1.1);}
.btn-primary:active{filter:brightness(.95);}

.mobile-tabs{
  display:flex;
  background:var(--panel-2);
  border-bottom:1px solid var(--panel-line);
}
.mobile-tabs button{
  flex:1;
  background:none;
  border:none;
  color:#93908a;
  padding:11px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  letter-spacing:.08em;
  text-transform:uppercase;
  border-bottom:2px solid transparent;
}
.mobile-tabs button.active{
  color:#fff;
  border-bottom-color:var(--accent);
}
@media(min-width:900px){.mobile-tabs{display:none;}}

.layout{
  display:grid;
  grid-template-columns:1fr;
  max-width:1400px;
  margin:0 auto;
}
@media(min-width:900px){
  .layout{grid-template-columns:340px 1fr;}
}

/* ============ EDIT PANE ============ */
.edit-pane{
  background:var(--panel);
  color:#eceae4;
  display:none;
}
.edit-pane.show{display:block;}
@media(min-width:900px){
  .edit-pane.show{display:flex;}
  .edit-pane{display:flex;height:calc(100vh - 61px);position:sticky;top:61px;}
}

.section-nav{
  display:flex;
  flex-wrap:wrap;
  gap:0;
  border-bottom:1px solid var(--panel-line);
  background:var(--panel-2);
}
@media(min-width:900px){
  .section-nav{
    flex-direction:column;
    flex-wrap:nowrap;
    width:118px;
    border-bottom:none;
    border-right:1px solid var(--panel-line);
    overflow-y:auto;
  }
}
.section-nav button{
  background:none;
  border:none;
  color:#8f8c85;
  text-align:left;
  padding:12px 10px;
  font-size:11.5px;
  font-family:'JetBrains Mono',monospace;
  letter-spacing:.04em;
  border-left:3px solid transparent;
  flex:1 1 auto;
  min-width:88px;
}
.section-nav button .num{color:var(--accent);margin-right:5px;}
.section-nav button.active{
  background:var(--panel);
  color:#fff;
  border-left-color:var(--accent);
}
.section-nav button:hover{color:#fff;}

.panel-content{
  padding:18px;
  flex:1;
  overflow-y:auto;
}
.panel-content h2{
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:.08em;
  margin:0 0 4px;
  color:#fff;
}
.panel-content .hint{
  font-size:12px;
  color:#8f8c85;
  margin:0 0 16px;
  line-height:1.5;
}

.field{margin-bottom:14px;}
.field label{
  display:block;
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:#93908a;
  margin-bottom:5px;
}
.field input[type=text],
.field input[type=email],
.field input[type=tel],
.field input[type=url],
.field input[type=month],
.field textarea{
  width:100%;
  background:#111318;
  border:1px solid var(--panel-line);
  color:#f2f0eb;
  padding:9px 10px;
  font-size:13.5px;
  border-radius:var(--radius);
  outline:none;
}
.field input:focus,.field textarea:focus{border-color:var(--accent);}
.field textarea{resize:vertical;min-height:64px;line-height:1.5;}
.field .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field .checkline{display:flex;align-items:center;gap:7px;margin-top:6px;}
.field .checkline input{width:auto;}
.field .checkline label{margin:0;text-transform:none;font-family:'Inter';font-size:12.5px;color:#c9c6bf;}

.card{
  background:#111318;
  border:1px solid var(--panel-line);
  border-radius:var(--radius);
  padding:14px;
  margin-bottom:12px;
}
.card-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}
.card-head .tag{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--accent);
  letter-spacing:.08em;
}
.icon-btn{
  background:none;
  border:1px solid var(--panel-line);
  color:#93908a;
  width:26px;height:26px;
  border-radius:var(--radius);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:13px;
  line-height:1;
}
.icon-btn:hover{color:#fff;border-color:#565a66;}
.icon-btn.danger:hover{color:var(--warn);border-color:var(--warn);}
.btn-row{display:flex;gap:6px;}

.add-btn{
  width:100%;
  background:none;
  border:1px dashed #444753;
  color:#c9c6bf;
  padding:11px;
  border-radius:var(--radius);
  font-size:12.5px;
  font-family:'JetBrains Mono',monospace;
  letter-spacing:.04em;
}
.add-btn:hover{border-color:var(--accent);color:#fff;}

.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;min-height:8px;}
.chip{
  background:#242731;
  border:1px solid var(--panel-line);
  color:#e5e2db;
  padding:5px 8px 5px 11px;
  border-radius:20px;
  font-size:12px;
  display:flex;align-items:center;gap:7px;
}
.chip button{background:none;border:none;color:#8f8c85;font-size:13px;padding:0;line-height:1;}
.chip button:hover{color:var(--warn);}

.photo-drop{
  border:1px dashed #444753;
  border-radius:var(--radius);
  padding:20px;
  text-align:center;
  color:#8f8c85;
  font-size:12.5px;
  margin-bottom:12px;
  cursor:pointer;
}
.photo-drop:hover{border-color:var(--accent);}
.photo-preview-wrap{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.photo-preview-wrap img{width:64px;height:64px;object-fit:cover;border-radius:50%;border:2px solid var(--panel-line);}

.reorder-list{display:flex;flex-direction:column;gap:6px;}
.reorder-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#111318;
  border:1px solid var(--panel-line);
  padding:9px 11px;
  border-radius:var(--radius);
  font-size:12.5px;
}

.swatch-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.swatch{
  border:1px solid var(--panel-line);
  border-radius:var(--radius);
  padding:9px;
  cursor:pointer;
  background:#111318;
}
.swatch.active{border-color:var(--accent);background:#171a24;}
.swatch .mini{height:36px;border-radius:1px;margin-bottom:7px;position:relative;overflow:hidden;}
.swatch .mini-name{font-size:11px;font-weight:600;color:#e5e2db;}
.swatch .mini-desc{font-size:10px;color:#8f8c85;margin-top:1px;}

.color-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:10px;}
.color-dot{width:24px;height:24px;border-radius:50%;border:2px solid #33353d;cursor:pointer;}
.color-dot.active{border-color:#fff;}
input[type=color]{width:34px;height:34px;border:none;background:none;padding:0;cursor:pointer;}

.footer-note{
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  color:#71685a;
  padding:12px 18px 20px;
  line-height:1.6;
  border-top:1px solid var(--panel-line);
}

/* ============ PREVIEW PANE ============ */
.preview-pane{
  display:none;
  padding:22px 14px 60px;
  background:var(--app-bg);
}
.preview-pane.show{display:block;}
@media(min-width:900px){
  .preview-pane.show{display:flex;}
  .preview-pane{display:flex;justify-content:center;overflow-y:auto;height:calc(100vh - 61px);}
}
#resume-preview{
  width:100%;
  max-width:800px;
  min-height:1035px;
  background:var(--paper);
  box-shadow:0 8px 30px rgba(0,0,0,.18);
  color:#1c1c1c;
  -webkit-print-color-adjust:exact;
  print-color-adjust:exact;
}

/* ============ SHARED RESUME PRIMITIVES ============ */
.rs-name{margin:0;line-height:1.05;}
.rs-title{margin:0;}
.rs-contact{display:flex;flex-wrap:wrap;gap:2px 14px;}
.rs-sec-title{text-transform:uppercase;}
.rs-bullets{margin:0;padding-left:18px;}
.rs-bullets li{margin-bottom:3px;}
.rs-empty{color:#999;font-style:italic;}

/* ---- Template 1: Ledger (ATS classic serif) ---- */
[data-template="1"]{font-family:'Source Serif 4',Georgia,serif;padding:50px 56px;}
[data-template="1"] .rs-name{font-size:28px;font-weight:700;letter-spacing:.01em;}
[data-template="1"] .rs-title{font-size:14px;color:#444;margin-top:3px;}
[data-template="1"] .rs-contact{font-size:11.5px;color:#333;margin-top:8px;border-top:1px solid #222;border-bottom:1px solid #222;padding:6px 0;}
[data-template="1"] .rs-sec-title{font-size:12.5px;letter-spacing:.1em;border-bottom:1px solid #222;padding-bottom:3px;margin:22px 0 10px;}
[data-template="1"] .rs-item-head{display:flex;justify-content:space-between;font-size:13.5px;font-weight:700;}
[data-template="1"] .rs-item-sub{font-size:12.5px;font-style:italic;color:#333;margin-bottom:4px;}
[data-template="1"] .rs-bullets{font-size:12.5px;color:#222;}
[data-template="1"] .rs-summary{font-size:13px;line-height:1.6;}

/* ---- Template 2: Signal (modern minimal sans) ---- */
[data-template="2"]{font-family:'Inter',sans-serif;padding:54px 58px;}
[data-template="2"] .rs-name{font-size:30px;font-weight:800;letter-spacing:-.02em;color:var(--r-accent);}
[data-template="2"] .rs-title{font-size:13.5px;color:#555;margin-top:4px;font-weight:500;}
[data-template="2"] .rs-contact{font-size:11.5px;color:#666;margin-top:12px;}
[data-template="2"] .rs-sec-title{font-size:11px;letter-spacing:.14em;color:var(--r-accent);font-weight:700;margin:24px 0 10px;}
[data-template="2"] .rs-item-head{display:flex;justify-content:space-between;font-size:13.5px;font-weight:700;}
[data-template="2"] .rs-item-sub{font-size:12px;color:#666;margin-bottom:5px;}
[data-template="2"] .rs-bullets{font-size:12.5px;color:#333;}
[data-template="2"] .rs-summary{font-size:13px;line-height:1.65;color:#333;}

/* ---- Template 3: Contour (color block sidebar) ---- */
[data-template="3"]{font-family:'Inter',sans-serif;display:grid;grid-template-columns:210px 1fr;min-height:1035px;}
[data-template="3"] .rs-sidebar{background:var(--r-accent);color:#fff;padding:40px 24px;}
[data-template="3"] .rs-main{padding:40px 34px;}
[data-template="3"] .rs-sidebar .rs-name{font-size:22px;font-weight:800;color:#fff;}
[data-template="3"] .rs-sidebar .rs-title{font-size:12px;color:rgba(255,255,255,.85);margin-top:4px;}
[data-template="3"] .rs-sidebar .rs-contact{flex-direction:column;font-size:11px;color:rgba(255,255,255,.9);margin-top:18px;gap:6px;}
[data-template="3"] .rs-sidebar .rs-sec-title{font-size:10.5px;letter-spacing:.1em;color:#fff;border-bottom:1px solid rgba(255,255,255,.35);padding-bottom:4px;margin:20px 0 8px;}
[data-template="3"] .rs-sidebar .chip-sm{display:inline-block;background:rgba(255,255,255,.18);padding:3px 8px;border-radius:10px;font-size:10.5px;margin:0 4px 4px 0;}
[data-template="3"] .rs-main .rs-sec-title{font-size:12px;letter-spacing:.08em;color:var(--r-accent);font-weight:700;margin:0 0 10px;}
[data-template="3"] .rs-main .rs-sec-title.first{margin-top:0;}
[data-template="3"] .rs-item-head{display:flex;justify-content:space-between;font-size:13px;font-weight:700;}
[data-template="3"] .rs-item-sub{font-size:11.5px;color:#666;margin-bottom:4px;}
[data-template="3"] .rs-bullets{font-size:12px;color:#333;}
[data-template="3"] .rs-summary{font-size:12.5px;line-height:1.6;color:#333;}

/* ---- Template 4: Nocturne (dark mode) ---- */
[data-template="4"]{font-family:'Inter',sans-serif;background:#17181c;color:#e9e7e1;padding:52px 56px;}
[data-template="4"] .rs-name{font-size:29px;font-weight:800;color:#fff;}
[data-template="4"] .rs-title{font-size:13.5px;color:var(--r-accent);margin-top:4px;}
[data-template="4"] .rs-contact{font-size:11.5px;color:#9c998f;margin-top:12px;}
[data-template="4"] .rs-sec-title{font-size:11px;letter-spacing:.12em;color:var(--r-accent);margin:24px 0 10px;border-bottom:1px solid #33353d;padding-bottom:4px;}
[data-template="4"] .rs-item-head{display:flex;justify-content:space-between;font-size:13.5px;font-weight:700;color:#fff;}
[data-template="4"] .rs-item-sub{font-size:12px;color:#9c998f;margin-bottom:5px;}
[data-template="4"] .rs-bullets{font-size:12.5px;color:#c9c6bf;}
[data-template="4"] .rs-summary{font-size:13px;line-height:1.65;color:#c9c6bf;}

/* ---- Template 5: Meridian (two column, sidebar left light) ---- */
[data-template="5"]{font-family:'Inter',sans-serif;display:grid;grid-template-columns:230px 1fr;min-height:1035px;}
[data-template="5"] .rs-sidebar{background:#f2f0ea;padding:40px 26px;border-right:3px solid var(--r-accent);}
[data-template="5"] .rs-main{padding:40px 34px;}
[data-template="5"] .rs-sidebar .rs-name{font-size:21px;font-weight:800;font-family:'Source Serif 4',serif;}
[data-template="5"] .rs-sidebar .rs-title{font-size:11.5px;color:#555;margin-top:4px;}
[data-template="5"] .rs-sidebar .rs-contact{flex-direction:column;font-size:10.8px;color:#444;margin-top:16px;gap:5px;}
[data-template="5"] .rs-sidebar .rs-sec-title{font-size:10.5px;letter-spacing:.09em;color:var(--r-accent);font-weight:700;margin:20px 0 8px;}
[data-template="5"] .rs-sidebar .chip-sm{display:block;font-size:11px;color:#333;margin-bottom:4px;}
[data-template="5"] .rs-main .rs-sec-title{font-size:12px;letter-spacing:.08em;font-weight:700;color:#1c1c1c;margin:0 0 10px;border-bottom:2px solid var(--r-accent);display:inline-block;padding-bottom:3px;}
[data-template="5"] .rs-main .rs-sec-block{margin-bottom:20px;}
[data-template="5"] .rs-item-head{display:flex;justify-content:space-between;font-size:13px;font-weight:700;}
[data-template="5"] .rs-item-sub{font-size:11.5px;color:#666;margin-bottom:4px;}
[data-template="5"] .rs-bullets{font-size:12px;color:#333;}
[data-template="5"] .rs-summary{font-size:12.5px;line-height:1.6;color:#333;}

/* ---- Template 6: Timeline (vertical line for experience) ---- */
[data-template="6"]{font-family:'Inter',sans-serif;padding:52px 56px;}
[data-template="6"] .rs-name{font-size:28px;font-weight:800;}
[data-template="6"] .rs-title{font-size:13.5px;color:var(--r-accent);margin-top:4px;font-weight:600;}
[data-template="6"] .rs-contact{font-size:11.5px;color:#666;margin-top:10px;}
[data-template="6"] .rs-sec-title{font-size:11.5px;letter-spacing:.1em;font-weight:700;margin:24px 0 12px;}
[data-template="6"] .rs-summary{font-size:13px;line-height:1.6;color:#333;}
[data-template="6"] .tl{position:relative;padding-left:22px;border-left:2px solid var(--r-accent);}
[data-template="6"] .tl-item{position:relative;padding-bottom:16px;}
[data-template="6"] .tl-item::before{content:'';position:absolute;left:-28px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--r-accent);}
[data-template="6"] .rs-item-head{display:flex;justify-content:space-between;font-size:13.5px;font-weight:700;}
[data-template="6"] .rs-item-sub{font-size:12px;color:#666;margin-bottom:4px;}
[data-template="6"] .rs-bullets{font-size:12.5px;color:#333;}
[data-template="6"] .plain-sec .rs-item-head{font-size:13px;font-weight:700;}
[data-template="6"] .plain-sec{margin-bottom:12px;}

/* ---- Template 7: Executive (centered serif letterhead) ---- */
[data-template="7"]{font-family:'Source Serif 4',Georgia,serif;padding:56px 64px;}
[data-template="7"] .rs-name{font-size:32px;font-weight:700;text-align:center;letter-spacing:.04em;}
[data-template="7"] .rs-title{font-size:13px;text-align:center;color:#555;margin-top:6px;letter-spacing:.06em;text-transform:uppercase;}
[data-template="7"] .rs-contact{justify-content:center;font-size:11.5px;color:#444;margin-top:12px;border-top:2px solid var(--r-accent);border-bottom:2px solid var(--r-accent);padding:8px 0;}
[data-template="7"] .rs-sec-title{font-size:13px;letter-spacing:.12em;text-align:center;margin:26px 0 12px;color:var(--r-accent);}
[data-template="7"] .rs-item-head{display:flex;justify-content:space-between;font-size:13.5px;font-weight:700;}
[data-template="7"] .rs-item-sub{font-size:12.5px;font-style:italic;color:#444;margin-bottom:5px;}
[data-template="7"] .rs-bullets{font-size:12.5px;color:#222;}
[data-template="7"] .rs-summary{font-size:13px;line-height:1.65;text-align:center;color:#333;max-width:560px;margin:0 auto;}

/* ---- Template 8: Terminal (monospace) ---- */
[data-template="8"]{font-family:'JetBrains Mono',monospace;padding:44px 48px;background:#0d0e11;color:#d7ead1;}
[data-template="8"] .rs-name{font-size:22px;font-weight:700;color:#fff;}
[data-template="8"] .rs-name::before{content:'$ whoami\A';white-space:pre;font-size:11px;color:var(--r-accent);display:block;margin-bottom:6px;}
[data-template="8"] .rs-title{font-size:12px;color:var(--r-accent);margin-top:2px;}
[data-template="8"] .rs-contact{font-size:11px;color:#8fae86;margin-top:10px;gap:4px 12px;}
[data-template="8"] .rs-sec-title{font-size:12px;color:var(--r-accent);margin:22px 0 9px;}
[data-template="8"] .rs-sec-title::before{content:'$ cat ';color:#5c7c55;}
[data-template="8"] .rs-item-head{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:#fff;}
[data-template="8"] .rs-item-sub{font-size:11px;color:#8fae86;margin-bottom:5px;}
[data-template="8"] .rs-bullets{font-size:11.5px;color:#c3d6bd;}
[data-template="8"] .rs-bullets li::marker{color:var(--r-accent);}
[data-template="8"] .rs-summary{font-size:12px;line-height:1.6;color:#c3d6bd;}

/* ---- Template 9: Compact (dense one-pager) ---- */
[data-template="9"]{font-family:'Inter',sans-serif;padding:30px 36px;font-size:11.5px;}
[data-template="9"] .rs-name{font-size:20px;font-weight:800;}

/* ============ PRINT ============ */
@media print{
  body *{visibility:hidden;}
  #resume-preview, #resume-preview *{visibility:visible;}
  #resume-preview{
    position:absolute;top:0;left:0;
    width:8.5in;min-height:11in;
    box-shadow:none;margin:0;
  }
  @page{margin:0;size:letter;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="mark">RB</span>
    <h1>Resume Builder</h1>
  </div>
  <span class="sub" id="autoTitle">untitled — edit and export as PDF</span>
  <button class="btn-primary" onclick="window.print()">⬇ Download PDF</button>
</div>

<div class="mobile-tabs">
  <button class="active" id="tabEdit" onclick="setMobileTab('edit')">Edit</button>
  <button id="tabPreview" onclick="setMobileTab('preview')">Preview</button>
</div>

<div class="layout">
  <div class="edit-pane show" id="editPane">
    <div class="section-nav" id="sectionNav"></div>
    <div class="panel-content" id="panelContent"></div>
  </div>
  <div class="preview-pane" id="previewPane">
    <div id="resume-preview" data-template="2"></div>
  </div>
</div>

<div class="footer-note">
  NOTE — nothing here saves automatically. Finish a draft in one sitting, or download the PDF before you close the tab.
</div>

<script>
/* ============================================================
   STATE
   ============================================================ */
let state = {
  basics:{name:'',title:'',email:'',phone:'',location:'',website:'',linkedin:''},
  photo:null,
  summary:'',
  experience:[],
  education:[],
  skills:[],
  certs:[],
  sectionOrder:['summary','experience','education','skills','certs'],
  template:2,
  accent:'#3457d5'
};

const TEMPLATES=[
  {id:1,name:'Ledger',desc:'ATS-safe serif classic',accentDefault:'#2b2d33'},
  {id:2,name:'Signal',desc:'Modern minimal sans',accentDefault:'#3457d5'},
  {id:3,name:'Contour',desc:'Color-block sidebar',accentDefault:'#c2542f'},
  {id:4,name:'Nocturne',desc:'Dark mode',accentDefault:'#5eead4'},
  {id:5,name:'Meridian',desc:'Two-column, light sidebar',accentDefault:'#3457d5'},
  {id:6,name:'Timeline',desc:'Chronological timeline',accentDefault:'#4a9d6f'},
  {id:7,name:'Executive',desc:'Centered serif letterhead',accentDefault:'#5c4a2e'},
  {id:8,name:'Terminal',desc:'Monospace, terminal style',accentDefault:'#6ee76e'},
  {id:9,name:'Compact',desc:'Dense one-pager',accentDefault:'#3457d5'},
  {id:10,name:'Portrait',desc:'Photo-forward header',accentDefault:'#c2542f'},
];

const PRESET_COLORS=['#3457d5','#c2542f','#4a9d6f','#8b5cf6','#e0447b','#2b2d33','#c9a227','#0f766e'];

const SECTION_LABELS={
  summary:'Summary',experience:'Experience',education:'Education',
  skills:'Skills',certs:'Certifications'
};

let activePanel='basics';
let mobileTab='edit';

function uid(){return 'id'+Math.random().toString(36).slice(2,10);}

/* ============================================================
   NAV / PANELS
   ============================================================ */
const NAV_ITEMS=[
  {key:'basics',label:'Basics',num:'01'},
  {key:'photo',label:'Photo',num:'02'},
  {key:'summary',label:'Summary',num:'03'},
  {key:'experience',label:'Experience',num:'04'},
  {key:'education',label:'Education',num:'05'},
  {key:'skills',label:'Skills',num:'06'},
  {key:'certs',label:'Certs',num:'07'},
  {key:'reorder',label:'Order',num:'08'},
  {key:'style',label:'Style',num:'09'},
];

function renderNav(){
  const nav=document.getElementById('sectionNav');
  nav.innerHTML=NAV_ITEMS.map(it=>
    `<button data-panel="${it.key}" class="${activePanel===it.key?'active':''}">
      <span class="num">${it.num}</span>${it.label}
    </button>`
  ).join('');
  nav.querySelectorAll('button').forEach(b=>{
    b.addEventListener('click',()=>{activePanel=b.dataset.panel;renderAll();});
  });
}

function setMobileTab(t){
  mobileTab=t;
  document.getElementById('editPane').classList.toggle('show',t==='edit');
  document.getElementById('previewPane').classList.toggle('show',t==='preview');
  document.getElementById('tabEdit').classList.toggle('active',t==='edit');
  document.getElementById('tabPreview').classList.toggle('active',t==='preview');
}

/* ============================================================
   PANEL RENDERERS
   ============================================================ */
function renderPanel(){
  const c=document.getElementById('panelContent');
  let html='';
  if(activePanel==='basics') html=panelBasics();
  else if(activePanel==='photo') html=panelPhoto();
  else if(activePanel==='summary') html=panelSummary();
  else if(activePanel==='experience') html=panelExperience();
  else if(activePanel==='education') html=panelEducation();
  else if(activePanel==='skills') html=panelSkills();
  else if(activePanel==='certs') html=panelCerts();
  else if(activePanel==='reorder') html=panelReorder();
  else if(activePanel==='style') html=panelStyle();
  c.innerHTML=html;
  bindPanelEvents();
}

function panelBasics(){
  const b=state.basics;
  return `
    <h2>Basics</h2>
    <p class="hint">Your name and how people reach you. This shows at the top no matter which style you pick.</p>
    <div class="field"><label>Full name</label><input type="text" data-b="name" value="${esc(b.name)}" placeholder="Jordan Casey"></div>
    <div class="field"><label>Title / tagline</label><input type="text" data-b="title" value="${esc(b.title)}" placeholder="Warehouse Operations Lead"></div>
    <div class="field row2">
      <div><label>Email</label><input type="email" data-b="email" value="${esc(b.email)}" placeholder="you@email.com"></div>
      <div><label>Phone</label><input type="tel" data-b="phone" value="${esc(b.phone)}" placeholder="(555) 555-0100"></div>
    </div>
    <div class="field"><label>Location</label><input type="text" data-b="location" value="${esc(b.location)}" placeholder="Gresham, OR"></div>
    <div class="field row2">
      <div><label>Website / portfolio</label><input type="url" data-b="website" value="${esc(b.website)}" placeholder="yoursite.com"></div>
      <div><label>LinkedIn</label><input type="text" data-b="linkedin" value="${esc(b.linkedin)}" placeholder="linkedin.com/in/you"></div>
    </div>
  `;
}

function panelPhoto(){
  return `
    <h2>Photo or logo</h2>
    <p class="hint">Optional. Shows on photo-forward styles like Portrait; hidden automatically on ATS-safe styles like Ledger.</p>
    ${state.photo?`
      <div class="photo-preview-wrap">
        <img src="${state.photo}">
        <button class="icon-btn danger" id="removePhoto">✕ Remove</button>
      </div>
    `:''}
    <label class="photo-drop" for="photoInput">${state.photo?'Choose a different image':'Click to upload an image — it will be cropped to a square'}</label>
    <input type="file" id="photoInput" accept="image/*" style="display:none">
  `;
}

function panelSummary(){
  return `
    <h2>Summary</h2>
    <p class="hint">2–3 sentences. What you do, your strongest skill, and what kind of role you want next.</p>
    <div class="field"><textarea data-field="summary" rows="6" placeholder="Detail-oriented operations lead with 6 years managing warehouse teams of 15+...">${esc(state.summary)}</textarea></div>
  `;
}

function panelExperience(){
  const items=state.experience.map((e,i)=>`
    <div class="card">
      <div class="card-head">
        <span class="tag">JOB ${i+1}</span>
        <div class="btn-row">
          ${i>0?`<button class="icon-btn" data-move="experience:${i}:-1">↑</button>`:''}
          ${i<state.experience.length-1?`<button class="icon-btn" data-move="experience:${i}:1">↓</button>`:''}
          <button class="icon-btn danger" data-remove="experience:${i}">✕</button>
        </div>
      </div>
      <div class="field"><label>Role</label><input type="text" data-list="experience" data-i="${i}" data-f="role" value="${esc(e.role)}" placeholder="Shift Supervisor"></div>
      <div class="field"><label>Company</label><input type="text" data-list="experience" data-i="${i}" data-f="company" value="${esc(e.company)}" placeholder="Acme Logistics"></div>
      <div class="field row2">
        <div><label>Start</label><input type="text" data-list="experience" data-i="${i}" data-f="start" value="${esc(e.start)}" placeholder="Jan 2022"></div>
        <div><label>End</label><input type="text" data-list="experience" data-i="${i}" data-f="end" value="${esc(e.end)}" placeholder="Present" ${e.current?'disabled':''}></div>
      </div>
      <div class="checkline">
        <input type="checkbox" id="cur${i}" data-list="experience" data-i="${i}" data-f="current" ${e.current?'checked':''}>
        <label for="cur${i}">I currently work here</label>
      </div>
      <div class="field"><label>Highlights (one per line)</label><textarea rows="4" data-list="experience" data-i="${i}" data-f="bulletsText" placeholder="Cut order-fulfillment errors 30% by rebuilding the pick-list process">${esc((e.bullets||[]).join('\n'))}</textarea></div>
    </div>
  `).join('');
  return `
    <h2>Experience</h2>
    <p class="hint">Most recent job first. Start bullets with a verb — "Led", "Cut", "Built" — and a number if you have one.</p>
    ${items}
    <button class="add-btn" id="addExperience">+ Add a job</button>
  `;
}

function panelEducation(){
  const items=state.education.map((e,i)=>`
    <div class="card">
      <div class="card-head">
        <span class="tag">SCHOOL ${i+1}</span>
        <div class="btn-row">
          ${i>0?`<button class="icon-btn" data-move="education:${i}:-1">↑</button>`:''}
          ${i<state.education.length-1?`<button class="icon-btn" data-move="education:${i}:1">↓</button>`:''}
          <button class="icon-btn danger" data-remove="education:${i}">✕</button>
        </div>
      </div>
      <div class="field"><label>School</label><input type="text" data-list="education" data-i="${i}" data-f="school" value="${esc(e.school)}" placeholder="Mt. Hood Community College"></div>
      <div class="field row2">
        <div><label>Degree</label><input type="text" data-list="education" data-i="${i}" data-f="degree" value="${esc(e.degree)}" placeholder="A.A.S."></div>
        <div><label>Field of study</label><input type="text" data-list="education" data-i="${i}" data-f="field" value="${esc(e.field)}" placeholder="Business Admin"></div>
      </div>
      <div class="field row2">
        <div><label>Start</label><input type="text" data-list="education" data-i="${i}" data-f="start" value="${esc(e.start)}" placeholder="2016"></div>
        <div><label>End</label><input type="text" data-list="education" data-i="${i}" data-f="end" value="${esc(e.end)}" placeholder="2018"></div>
      </div>
      <div class="field"><label>Details (optional)</label><input type="text" data-list="education" data-i="${i}" data-f="details" value="${esc(e.details||'')}" placeholder="Dean's list, 2017"></div>
    </div>
  `).join('');
  return `
    <h2>Education</h2>
    <p class="hint">Not everyone needs this filled all the way out — skip fields that don't apply.</p>
    ${items}
    <button class="add-btn" id="addEducation">+ Add a school</button>
  `;
}

function panelSkills(){
  const chips=state.skills.map((s,i)=>`<span class="chip">${esc(s)}<button data-removeskill="${i}">✕</button></span>`).join('');
  return `
    <h2>Skills</h2>
    <p class="hint">Type a skill and hit Enter or comma to add it.</p>
    <div class="chips">${chips||'<span class="hint" style="margin:0;">No skills added yet.</span>'}</div>
    <div class="field"><input type="text" id="skillInput" placeholder="Forklift certified, Excel, Team leadership..."></div>
  `;
}

function panelCerts(){
  const items=state.certs.map((c,i)=>`
    <div class="card">
      <div class="card-head">
        <span class="tag">CERT ${i+1}</span>
        <button class="icon-btn danger" data-remove="certs:${i}">✕</button>
      </div>
      <div class="field"><label>Name</label><input type="text" data-list="certs" data-i="${i}" data-f="name" value="${esc(c.name)}" placeholder="OSHA 10"></div>
      <div class="field row2">
        <div><label>Issuer</label><input type="text" data-list="certs" data-i="${i}" data-f="org" value="${esc(c.org)}" placeholder="OSHA"></div>
        <div><label>Year</label><input type="text" data-list="certs" data-i="${i}" data-f="year" value="${esc(c.year)}" placeholder="2023"></div>
      </div>
    </div>
  `).join('');
  return `
    <h2>Certifications</h2>
    <p class="hint">Licenses, certs, training — anything with a name a hiring manager would recognize.</p>
    ${items}
    <button class="add-btn" id="addCert">+ Add a certification</button>
  `;
}

function panelReorder(){
  const items=state.sectionOrder.map((k,i)=>`
    <div class="reorder-item">
      <span>${SECTION_LABELS[k]}</span>
      <div class="btn-row">
        ${i>0?`<button class="icon-btn" data-reorder="${i}:-1">↑</button>`:''}
        ${i<state.sectionOrder.length-1?`<button class="icon-btn" data-reorder="${i}:1">↓</button>`:''}
      </div>
    </div>
  `).join('');
  return `
    <h2>Section order</h2>
    <p class="hint">Contact info always stays at the top. Reorder everything below it — move Skills up if that's your strongest sell.</p>
    <div class="reorder-list">${items}</div>
  `;
}

function panelStyle(){
  const swatches=TEMPLATES.map(t=>`
    <div class="swatch ${state.template===t.id?'active':''}" data-template="${t.id}">
      <div class="mini" style="background:${t.id===4?'#17181c':t.id===8?'#0d0e11':'#f5f4f0'};">
        <div style="position:absolute;left:6px;top:6px;width:60%;height:5px;background:${t.accentDefault};border-radius:1px;"></div>
        <div style="position:absolute;left:6px;top:15px;width:40%;height:3px;background:${t.id===4||t.id===8?'#555':'#ccc'};border-radius:1px;"></div>
        <div style="position:absolute;left:6px;top:22px;width:75%;height:3px;background:${t.id===4||t.id===8?'#444':'#ddd'};border-radius:1px;"></div>
      </div>
      <div class="mini-name">${t.name}</div>
      <div class="mini-desc">${t.desc}</div>
    </div>
  `).join('');
  const dots=PRESET_COLORS.map(c=>`<button class="color-dot ${state.accent===c?'active':''}" style="background:${c}" data-color="${c}"></button>`).join('');
  return `
    <h2>Style</h2>
    <p class="hint">Pick a layout, then set an accent color. Everything updates live in the preview.</p>
    <div class="swatch-grid">${swatches}</div>
    <div class="field" style="margin-top:18px;">
      <label>Accent color</label>
      <div class="color-row">
        ${dots}
        <input type="color" id="customColor" value="${state.accent}">
      </div>
    </div>
  `;
}

/* ============================================================
   EVENT BINDING (delegated per-panel, re-bound on each render)
   ============================================================ */
function bindPanelEvents(){
  const c=document.getElementById('panelContent');

  c.querySelectorAll('[data-b]').forEach(el=>{
    el.addEventListener('input',()=>{state.basics[el.dataset.b]=el.value;renderPreview();updateTitle();});
  });

  const summaryEl=c.querySelector('[data-field="summary"]');
  if(summaryEl) summaryEl.addEventListener('input',()=>{state.summary=summaryEl.value;renderPreview();});

  c.querySelectorAll('[data-list]').forEach(el=>{
    el.addEventListener('input',()=>{
      const list=state[el.dataset.list];
      const item=list[+el.dataset.i];
      const f=el.dataset.f;
      if(f==='bulletsText'){
        item.bullets=el.value.split('\n').map(s=>s.trim()).filter(Boolean);
      } else if(f==='current'){
        item.current=el.checked;
        if(item.current) item.end='Present';
        renderPanel();
      } else {
        item[f]=el.value;
      }
      renderPreview();
    });
  });

  c.querySelectorAll('[data-move]').forEach(el=>{
    el.addEventListener('click',()=>{
      const[listName,idx,dir]=el.dataset.move.split(':');
      const list=state[listName];
      const i=+idx,d=+dir;
      [list[i],list[i+d]]=[list[i+d],list[i]];
      renderPanel();renderPreview();
    });
  });

  c.querySelectorAll('[data-remove]').forEach(el=>{
    el.addEventListener('click',()=>{
      const[listName,idx]=el.dataset.remove.split(':');
      state[listName].splice(+idx,1);
      renderPanel();renderPreview();
    });
  });

  const addExp=c.querySelector('#addExperience');
  if(addExp) addExp.addEventListener('click',()=>{
    state.experience.push({id:uid(),role:'',company:'',location:'',start:'',end:'',current:false,bullets:[]});
    renderPanel();renderPreview();
  });

  const addEdu=c.querySelector('#addEducation');
  if(addEdu) addEdu.addEventListener('click',()=>{
    state.education.push({id:uid(),school:'',degree:'',field:'',start:'',end:'',details:''});
    renderPanel();renderPreview();
  });

  const addCert=c.querySelector('#addCert');
  if(addCert) addCert.addEventListener('click',()=>{
    state.certs.push({id:uid(),name:'',org:'',year:''});
    renderPanel();renderPreview();
  });

  const skillInput=c.querySelector('#skillInput');
  if(skillInput){
    skillInput.addEventListener('keydown',(e)=>{
      if(e.key==='Enter'||e.key===','){
        e.preventDefault();
        const v=skillInput.value.replace(/,/g,'').trim();
        if(v){state.skills.push(v);skillInput.value='';renderPanel();renderPreview();
          document.getElementById('skillInput').focus();}
      }
    });
  }
  c.querySelectorAll('[data-removeskill]').forEach(el=>{
    el.addEventListener('click',()=>{
      state.skills.splice(+el.dataset.removeskill,1);
      renderPanel();renderPreview();
    });
  });

  c.querySelectorAll('[data-reorder]').forEach(el=>{
    el.addEventListener('click',()=>{
      const[idx,dir]=el.dataset.reorder.split(':');
      const i=+idx,d=+dir;
      const arr=state.sectionOrder;
      [arr[i],arr[i+d]]=[arr[i+d],arr[i]];
      renderPanel();renderPreview();
    });
  });

  c.querySelectorAll('[data-template]').forEach(el=>{
    el.addEventListener('click',()=>{
      state.template=+el.dataset.template;
      renderPanel();renderPreview();
    });
  });

  c.querySelectorAll('[data-color]').forEach(el=>{
    el.addEventListener('click',()=>{
      state.accent=el.dataset.color;
      renderPanel();renderPreview();
    });
  });
  const customColor=c.querySelector('#customColor');
  if(customColor) customColor.addEventListener('input',()=>{
    state.accent=customColor.value;
    renderPreview();
  });

  const photoInput=c.querySelector('#photoInput');
  if(photoInput) photoInput.addEventListener('change',handlePhotoUpload);
  const removePhoto=c.querySelector('#removePhoto');
  if(removePhoto) removePhoto.addEventListener('click',()=>{state.photo=null;renderPanel();renderPreview();});
}

function updateTitle(){
  document.getElementById('autoTitle').textContent=
    (state.basics.name?state.basics.name+' — ':'')+'edit and export as PDF';
}

/* ============================================================
   PHOTO UPLOAD — resize/crop to square via canvas
   ============================================================ */
function handlePhotoUpload(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    const img=new Image();
    img.onload=()=>{
      const size=480;
      const canvas=document.createElement('canvas');
      canvas.width=size;canvas.height=size;
      const ctx=canvas.getContext('2d');
      const s=Math.min(img.width,img.height);
      const sx=(img.width-s)/2, sy=(img.height-s)/2;
      ctx.drawImage(img,sx,sy,s,s,0,0,size,size);
      state.photo=canvas.toDataURL('image/jpeg',0.9);
      renderPanel();renderPreview();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

/* ============================================================
   PREVIEW RENDER
   ============================================================ */
function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function contactLine(){
  const b=state.basics;
  const parts=[b.location,b.phone,b.email,b.website,b.linkedin].filter(Boolean);
  return parts.map(p=>`<span>${esc(p)}</span>`).join('');
}

function sectionHTML(key,opts){
  opts=opts||{};
  const titleClass='rs-sec-title'+(opts.first?' first':'');
  if(key==='summary'){
    if(!state.summary) return '';
    return `<div class="${titleClass}">Summary</div><p class="rs-summary">${esc(state.summary)}</p>`;
  }
  if(key==='experience'){
    if(!state.experience.length) return '';
    const rows=state.experience.map(e=>`
      <div class="rs-item-head"><span>${esc(e.role)||'Role'}${e.company?' — '+esc(e.company):''}</span><span>${esc(e.start)} – ${esc(e.current?'Present':e.end)}</span></div>
      <div class="rs-item-sub">${esc(e.location||'')}</div>
      <ul class="rs-bullets">${(e.bullets||[]).map(b=>`<li>${esc(b)}</li>`).join('')}</ul>
    `).join('<div style="height:10px"></div>');
    return `<div class="${titleClass}">Experience</div>${rows}`;
  }
  if(key==='education'){
    if(!state.education.length) return '';
    const rows=state.education.map(e=>`
      <div class="rs-item-head"><span>${esc(e.school)||'School'}</span><span>${esc(e.start)} – ${esc(e.end)}</span></div>
      <div class="rs-item-sub">${[e.degree,e.field].filter(Boolean).map(esc).join(', ')}${e.details?' · '+esc(e.details):''}</div>
    `).join('<div style="height:6px"></div>');
    return `<div class="${titleClass}">Education</div>${rows}`;
  }
  if(key==='skills'){
    if(!state.skills.length) return '';
    return `<div class="${titleClass}">Skills</div><p style="font-size:12.5px;">${state.skills.map(esc).join('  ·  ')}</p>`;
  }
  if(key==='certs'){
    if(!state.certs.length) return '';
    const rows=state.certs.map(c=>`<div class="rs-item-head"><span>${esc(c.name)}${c.org?' — '+esc(c.org):''}</span><span>${esc(c.year)}</span></div>`).join('');
    return `<div class="${titleClass}">Certifications</div>${rows}`;
  }
  return '';
}

function renderStandardBody(includeSummaryFirst){
  let html='';
  state.sectionOrder.forEach((k,i)=>{
    html+=sectionHTML(k,{first:i===0});
  });
  return html;
}

function renderPreview(){
  const el=document.getElementById('resume-preview');
  el.dataset.template=state.template;
  el.style.setProperty('--r-accent',state.accent);

  const b=state.basics;
  const nameHTML=`<h1 class="rs-name">${esc(b.name)||'Your Name'}</h1>`;
  const titleHTML=b.title?`<p class="rs-title">${esc(b.title)}</p>`:'';

  let html='';

  if(state.template===3||state.template===5){
    // sidebar layouts
    const sidebarSkills=state.skills.map(s=>`<span class="chip-sm">${esc(s)}</span>`).join('');
    const eduMini=state.education.map(e=>`
      <div style="margin-bottom:8px;">
        <div style="font-weight:700;font-size:11.5px;">${esc(e.school)}</div>
        <div style="font-size:10.5px;color:${state.template===3?'rgba(255,255,255,.85)':'#555'};">${[e.degree,e.field].filter(Boolean).map(esc).join(', ')}</div>
      </div>
    `).join('');
    html=`
      <div class="rs-sidebar">
        ${nameHTML}${titleHTML}
        <div class="rs-contact">${contactLine()}</div>
        ${state.skills.length?`<div class="rs-sec-title">Skills</div>${sidebarSkills}`:''}
        ${state.education.length?`<div class="rs-sec-title">Education</div>${eduMini}`:''}
        ${state.certs.length?`<div class="rs-sec-title">Certs</div>${state.certs.map(c=>`<div class="chip-sm">${esc(c.name)} ${c.year?'('+esc(c.year)+')':''}</div>`).join('')}`:''}
      </div>
      <div class="rs-main">
        ${sectionHTML('summary',{first:true})}
        ${sectionHTML('experience')}
      </div>
    `;
  } else if(state.template===6){
    const expBlock=state.experience.length?`
      <div class="rs-sec-title">Experience</div>
      <div class="tl">
        ${state.experience.map(e=>`
          <div class="tl-item">
            <div class="rs-item-head"><span>${esc(e.role)}${e.company?' — '+esc(e.company):''}</span><span>${esc(e.start)} – ${esc(e.current?'Present':e.end)}</span></div>
            <div class="rs-item-sub">${esc(e.location||'')}</div>
            <ul class="rs-bullets">${(e.bullets||[]).map(bl=>`<li>${esc(bl)}</li>`).join('')}</ul>
          </div>
        `).join('')}
      </div>
    `:'';
    const others=state.sectionOrder.filter(k=>k!=='experience'&&k!=='summary').map(k=>`<div class="plain-sec">${sectionHTML(k)}</div>`).join('');
    html=`
      ${nameHTML}${titleHTML}
      <div class="rs-contact">${contactLine()}</div>
      ${sectionHTML('summary',{first:true})}
      ${expBlock}
      ${others}
    `;
  } else if(state.template===9){
    // compact — two-col for skills/certs
    const main=state.sectionOrder.map((k,i)=>{
      if(k==='skills'||k==='certs') return '';
      return sectionHTML(k,{first:i===0});
    }).join('');
    const skillsCerts=`
      <div class="two-col">
        ${sectionHTML('skills')}
        ${sectionHTML('certs')}
      </div>
    `;
    html=`
      ${nameHTML}${titleHTML}
      <div class="rs-contact">${contactLine()}</div>
      ${main}
      ${skillsCerts}
    `;
  } else if(state.template===10){
    html=`
      <div class="rs-hero">
        ${state.photo?`<img src="${state.photo}">`:`<div class="noph"></div>`}
        <div>
          ${nameHTML}${titleHTML}
          <div class="rs-contact">${contactLine()}</div>
        </div>
      </div>
      <div class="rs-body">${renderStandardBody()}</div>
    `;
  } else {
    // 1,2,4,7,8 — single column standard
    html=`
      ${nameHTML}${titleHTML}
      <div class="rs-contact">${contactLine()}</div>
      ${renderStandardBody()}
    `;
  }

  el.innerHTML=html;
}

/* ============================================================
   BOOT
   ============================================================ */
function renderAll(){
  renderNav();
  renderPanel();
  renderPreview();
  updateTitle();
}
renderAll();
</script>
